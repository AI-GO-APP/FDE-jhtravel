<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>旅遊契約線上簽署</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:#eef2f7;color:#1f2937}
  .wrap{max-width:820px;margin:0 auto;padding:24px 16px}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:22px;box-shadow:0 4px 16px rgba(15,23,42,.06);margin-bottom:16px}
  h1{font-size:22px;margin:0 0 4px}
  .muted{color:#6b7280;font-size:14px}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:8px;font-size:14px;margin-top:12px}
  .kv div:nth-child(odd){color:#6b7280}
  iframe{width:100%;height:560px;border:1px solid #e5e7eb;border-radius:10px}
  label{display:block;font-size:13px;font-weight:700;margin:14px 0 6px}
  input{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px;font-size:15px}
  .btn{border:0;border-radius:10px;background:#2563eb;color:#fff;padding:13px 18px;font-weight:800;font-size:15px;cursor:pointer;width:100%;margin-top:14px}
  .btn:disabled{background:#9ca3af;cursor:not-allowed}
  .ok{background:#dcfce7;color:#166534;padding:14px;border-radius:10px;font-weight:700;text-align:center}
  .err{background:#fee2e2;color:#991b1b;padding:14px;border-radius:10px;font-weight:700;text-align:center}
  .badge{display:inline-block;background:#fef3c7;color:#92400e;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700}
  .chk{display:flex;gap:8px;align-items:flex-start;margin-top:14px;font-size:14px}
  .chk input{width:auto;margin-top:3px}
  .pad{border:1px dashed #9ca3af;border-radius:10px;background:#fff;touch-action:none;width:100%;height:170px;display:block}
  .padbar{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="card">載入中…</div></div>
<script>
const $ = s => document.querySelector(s);
const token = new URLSearchParams(location.search).get('t');
const money = n => 'NT$ '+(n||0).toLocaleString();
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function load(){
  if(!token){ $('#app').innerHTML = '<div class="card"><div class="err">無效的簽署連結</div></div>'; return; }
  let d;
  try{ const r = await fetch('/api/sign/'+encodeURIComponent(token)); d = await r.json(); if(!r.ok) throw new Error(d.error||'連結無效'); }
  catch(e){ $('#app').innerHTML = `<div class="card"><div class="err">${esc(e.message)}</div></div>`; return; }

  const o = d.order, signed = d.contract.signed_status === '已簽';
  const ppl = d.items.map(i=>`${esc(i.pt_name)}×${i.qty}`).join('、');
  $('#app').innerHTML = `
    <div class="card">
      <h1>旅遊契約線上簽署</h1>
      <div class="muted">${esc(d.template?d.template.template_name:'旅遊定型化契約')}　契約編號 ${esc(d.contract.contract_no)}</div>
      <div class="kv">
        <div>訂單</div><div>${esc(o.order_no)}</div>
        <div>行程</div><div>${esc(o.product_name)}（${esc(o.region_type)}）</div>
        <div>團號</div><div>${esc(o.tour_code)}</div>
        <div>出發 / 回程</div><div>${o.start_date} ~ ${o.end_date}</div>
        <div>報名人</div><div>${esc(o.customer_name)}</div>
        <div>旅客</div><div>${ppl}</div>
      </div>
    </div>
    <div class="card">
      <h1 style="font-size:17px">契約內容</h1>
      ${d.template&&d.template.pdf_file?`<iframe src="${esc(d.template.pdf_file)}"></iframe>
        <div class="muted" style="margin-top:8px"><a href="${esc(d.template.pdf_file)}" target="_blank">在新分頁開啟 / 下載 PDF</a></div>`
        :'<div class="muted">（契約內容載入失敗）</div>'}
    </div>
    <div class="card" id="signCard"></div>`;

  if(signed){
    const sig = d.contract.signature ? `<div style="margin-top:12px"><div class="muted" style="margin-bottom:6px">簽名</div><img src="${d.contract.signature}" style="max-width:320px;border:1px solid #e5e7eb;border-radius:8px;background:#fff"></div>` : '';
    $('#signCard').innerHTML = `<div class="ok">✓ 本契約已於 ${esc((d.contract.signed_at||'').replace('T',' '))} 由「${esc(d.contract.signer_name)}」完成簽署</div>${sig}`;
    return;
  }
  $('#signCard').innerHTML = `
    <h1 style="font-size:17px">簽署</h1>
    <div class="muted">請報名人 <b>${esc(o.customer_name)}</b> 確認上方契約內容後親筆簽署。</div>
    <label>簽署人姓名(報名人,不可修改)</label>
    <input id="signer" value="${esc(o.customer_name)}" readonly style="background:#f3f4f6;color:#374151;cursor:not-allowed">
    <label>手寫簽名</label>
    <canvas id="pad" class="pad"></canvas>
    <div class="padbar"><span class="muted">請在框內以滑鼠或手指簽名</span>
      <button onclick="clearPad()" style="border:0;border-radius:8px;background:#6b7280;color:#fff;padding:8px 14px;font-weight:700;cursor:pointer">清除</button></div>
    <div class="chk"><input type="checkbox" id="agree" onchange="updateSignBtn()"><label for="agree" style="margin:0;font-weight:400">本人已詳閱並同意上述旅遊定型化契約之全部內容。</label></div>
    <button class="btn" id="signBtn" onclick="doSign()" disabled>確認簽署</button>
    <div class="muted" style="margin-top:6px">完成「手寫簽名」並勾選同意後,即可點選確認簽署。</div>`;
  initPad();
}
function updateSignBtn(){ const b = document.getElementById('signBtn'); const a = document.getElementById('agree'); if(b) b.disabled = !(hasDrawn && a && a.checked); }

let pad, pctx, drawing=false, hasDrawn=false;
function initPad(){
  pad = document.getElementById('pad'); if(!pad) return;
  const rect = pad.getBoundingClientRect();
  pad.width = rect.width; pad.height = rect.height;
  pctx = pad.getContext('2d');
  pctx.lineWidth = 2.5; pctx.lineCap = 'round'; pctx.lineJoin = 'round'; pctx.strokeStyle = '#111827';
  hasDrawn = false;
  const pos = e => { const r = pad.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
  const start = e => { drawing = true; const p = pos(e); pctx.beginPath(); pctx.moveTo(p.x, p.y); e.preventDefault(); };
  const move = e => { if(!drawing) return; const p = pos(e); pctx.lineTo(p.x, p.y); pctx.stroke(); hasDrawn = true; updateSignBtn(); e.preventDefault(); };
  const end = () => { drawing = false; };
  pad.addEventListener('mousedown', start); pad.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
  pad.addEventListener('touchstart', start, {passive:false}); pad.addEventListener('touchmove', move, {passive:false}); pad.addEventListener('touchend', end);
}
window.clearPad = () => { if(pctx) pctx.clearRect(0, 0, pad.width, pad.height); hasDrawn = false; updateSignBtn(); };

window.doSign = async () => {
  if(!hasDrawn || !$('#agree').checked) return;  // 按鈕本就停用,雙重保險
  $('#signBtn').disabled = true;
  const signature = pad.toDataURL('image/png');
  try{
    const r = await fetch('/api/sign/'+encodeURIComponent(token), {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signature})});
    const d = await r.json(); if(!r.ok) throw new Error(d.error||'簽署失敗');
    const sig = `<div style="margin-top:12px"><div class="muted" style="margin-bottom:6px">簽名</div><img src="${signature}" style="max-width:320px;border:1px solid #e5e7eb;border-radius:8px;background:#fff"></div>`;
    $('#signCard').innerHTML = '<div class="ok">✓ 簽署完成,感謝您!此頁可關閉。</div>'+sig;
  }catch(e){ $('#signBtn').disabled=false; alert(e.message); }
};
load();
</script>
</body>
</html>
