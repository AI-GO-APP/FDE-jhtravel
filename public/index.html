<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>旅遊團控系統 — 後台</title>
<style>
:root{
  --bg:#f3f6fb;--sidebar:#12233f;--primary:#2563eb;--primary2:#1d4ed8;
  --text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--card:#ffffff;
  --green:#16a34a;--orange:#f59e0b;--red:#dc2626;--blue:#0284c7;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--text)}
.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--sidebar);color:#fff;padding:22px 16px;position:fixed;left:0;top:0;bottom:0;overflow:auto}
.logo{font-size:20px;font-weight:800;margin-bottom:6px}
.sublogo{font-size:12px;color:#b8c3d9;margin-bottom:24px}
.nav button{width:100%;border:0;background:transparent;color:#d8e1f3;text-align:left;padding:12px 12px;border-radius:10px;margin:3px 0;cursor:pointer;font-size:15px}
.nav button:hover,.nav button.active{background:rgba(255,255,255,.13);color:#fff}
.main{margin-left:248px;width:calc(100% - 248px)}
.topbar{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:9}
.topbar h1{font-size:20px;margin:0}
.user{font-size:13px;color:var(--muted)}
.content{padding:24px}
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 4px 16px rgba(15,23,42,.04)}
.card h3{margin:0 0 12px;font-size:16px}
.metric{font-size:28px;font-weight:800;margin:6px 0}
.muted{color:var(--muted);font-size:13px}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}
.b-green{background:#dcfce7;color:#166534}.b-blue{background:#e0f2fe;color:#075985}.b-orange{background:#fef3c7;color:#92400e}.b-red{background:#fee2e2;color:#991b1b}.b-gray{background:#f3f4f6;color:#374151}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}
th,td{padding:13px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top}
th{background:#f8fafc;color:#475569;font-weight:800}
tr:hover td{background:#f9fbff}
.btn{border:0;border-radius:10px;background:var(--primary);color:#fff;padding:10px 14px;cursor:pointer;font-weight:700;font-size:14px}
.btn:hover{background:var(--primary2)}
.btn.secondary{background:#eef2ff;color:#1e40af}
.btn.ghost{background:#f3f4f6;color:#374151}
.btn.danger{background:#fee2e2;color:#991b1b}
.btn.sm{padding:6px 10px;font-size:13px}
.form{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.form.one{grid-template-columns:1fr}
.form label,.fld label{font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:6px}
input,select,textarea{width:100%;padding:11px;border:1px solid #d1d5db;border-radius:10px;background:#fff;font-size:14px}
textarea{min-height:80px}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:8px 0}
.progress span{display:block;height:100%;background:var(--green)}
.progress.orange span{background:var(--orange)}
.progress.blue span{background:var(--blue)}
.kv{display:grid;grid-template-columns:140px 1fr;gap:8px;font-size:14px}
.kv div:nth-child(odd){color:var(--muted)}
.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.section-title h2{margin:0;font-size:24px}
.total{font-size:24px;font-weight:900;color:#1d4ed8}
.formbox{background:#f8fafc;border:1px solid #e3e8ef;border-radius:12px;padding:16px;margin-bottom:16px}
.hide{display:none}
.link{color:var(--primary);cursor:pointer;font-weight:700}
.link:hover{text-decoration:underline}
.qty{width:90px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;opacity:0;transition:.2s;z-index:99;max-width:80%}
.toast.show{opacity:1}.toast.err{background:#b91c1c}
.crumb{color:var(--primary);cursor:pointer;font-weight:700;font-size:14px;display:inline-block;margin-bottom:10px}
@media(max-width:900px){
  .sidebar{position:static;width:100%;height:auto}.app{display:block}.main{margin-left:0;width:100%}
  .grid-4,.grid-3,.grid-2,.form{grid-template-columns:1fr}.topbar{position:static}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">旅遊團控系統</div>
    <div class="sublogo">後台｜第一階段地基</div>
    <div class="nav" id="nav">
      <button data-page="tours" class="active">團期列表</button>
      <button data-page="products">商品管理</button>
      <button data-page="orders">訂單管理</button>
      <button data-page="customers">客戶管理</button>
      <button data-page="contracts">契約管理</button>
      <button data-page="payments">收款管理</button>
      <button data-page="settings">設定</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1 id="pageTitle">團期列表</h1>
      <div class="user" id="todayLabel">OP 管理者</div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (s, r=document) => r.querySelector(s);
const C = () => $('#content');
const api = async (url, method='GET', body) => {
  const r = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: body?JSON.stringify(body):undefined });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || '操作失敗');
  return d;
};
const toast = (m, err=false) => { const t=$('#toast'); t.textContent=m; t.className='toast show'+(err?' err':''); setTimeout(()=>t.className='toast',2800); };
const money = n => 'NT$ '+(n||0).toLocaleString();
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = (a,b) => b? Math.min(100,Math.round(a/b*100)) : 0;
const tourBadge = s => { const m={'報名中':'b-green','已成團':'b-blue','不成團取消':'b-red','草稿':'b-gray','關閉':'b-gray'}; return `<span class="badge ${m[s]||'b-gray'}">${esc(s)}</span>`; };
const orderBadge = s => { const m={'待付訂金':'b-orange','已確認':'b-blue','已完成':'b-green','取消':'b-gray','逾期取消':'b-gray'}; return `<span class="badge ${m[s]||'b-gray'}">${esc(s)}</span>`; };
const isActiveOrder = s => s==='待付訂金'||s==='已確認'||s==='已完成';
const signBadge = s => `<span class="badge ${s==='已簽'?'b-green':'b-orange'}">${esc(s||'未簽')}</span>`;
const payBadge = (paid,total) => paid<=0?'<span class="badge b-gray">未收</span>':(paid<total?'<span class="badge b-orange">部分收款</span>':'<span class="badge b-green">已付清</span>');
// 收款備註欄顯示:匯款末5碼(對帳用)＋業務自由備註
const payNote = p => [p.note?'後5碼 '+esc(p.note):'', p.remark?esc(p.remark):''].filter(Boolean).join('・') || '';

let META = { passenger_types:[], resource_types:[], contract_templates:[], price_tiers:[] };
// 通路來源 → 預設價別:同業走同業價,其餘(官網/櫃台/業務)走預設(直客價)。業務後台仍可手動改。
const defaultTierId = () => { const d=(META.price_tiers||[]).find(t=>t.is_default); return d?d.price_tier_id:(META.price_tiers[0]&&META.price_tiers[0].price_tier_id); };
const tierForChannel = ch => { if(ch==='同業'){ const t=(META.price_tiers||[]).find(t=>/同業/.test(t.name)); if(t) return t.price_tier_id; } return defaultTierId(); };
const state = { page:'tours', curTour:null, curOrder:null, signupTour:null };
const TITLES = { tours:'團期列表', products:'商品管理', signup:'客戶報名', orders:'訂單管理',
  customers:'客戶管理', contracts:'契約管理', payments:'收款管理', settings:'設定',
  tourControl:'單團控團', orderDetail:'訂單詳情' };
const RENDER = { tours:renderTours, products:renderProducts, signup:renderSignup, orders:renderOrders,
  customers:renderCustomers, contracts:renderContracts, payments:renderPayments, settings:renderSettings };

function go(page){
  state.page = page;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  $('#pageTitle').innerText = TITLES[page] || '旅遊團控系統';
  window.scrollTo({top:0,behavior:'smooth'});
  RENDER[page]();
}
function setTitle(t){ $('#pageTitle').innerText = t; document.querySelectorAll('#nav button').forEach(b=>b.classList.remove('active')); }

// ═══════════ 團期列表(步驟2~4)═══════════
async function renderTours(){
  const tours = await api('/api/tours');
  C().innerHTML = `
    <div class="section-title"><h2>團期列表</h2><button class="btn" onclick="toggleTourForm()">＋ 開團</button></div>
    <div id="tourForm" class="formbox hide"></div>
    <div class="card"><table>
      <tr><th>團號</th><th>行程</th><th>出發日</th><th>截止日</th><th>成團門檻</th><th>已報名</th><th>報名上限</th><th>可售</th><th>狀態</th><th>操作</th></tr>
      ${tours.map(t=>`<tr>
        <td>${esc(t.tour_code)}</td><td>${esc(t.product_name)}</td><td>${t.start_date}</td><td>${t.signup_deadline}</td>
        <td>${t.min_pax}</td><td>${t.signed_pax}</td><td>${t.max_pax>0?t.max_pax:'不限'}</td><td><b>${t.available.min}</b></td><td>${tourBadge(t.status)}</td>
        <td><span class="link" onclick="openTour(${t.tour_id})">查看</span></td></tr>`).join('')
       || '<tr><td colspan=10 class="muted">尚無團期,點「開團」建立</td></tr>'}
    </table></div>`;
}
window.toggleTourForm = async () => {
  const box = $('#tourForm');
  if(!box.classList.contains('hide')){ box.classList.add('hide'); return; }
  const products = await api('/api/products');
  const inv = META.resource_types.map(r=>`<div class="fld"><label>${esc(r.name)} 總數</label><input type="number" min="0" value="0" data-res="${r.resource_type_id}"></div>`).join('');
  const prc = (META.price_tiers||[]).map(tier=>
    `<div class="fld" style="grid-column:1/-1;margin-top:4px"><strong>${esc(tier.name)}</strong></div>` +
    META.passenger_types.map(p=>`<div class="fld"><label>${esc(p.name)} 售價</label><input type="number" min="0" value="0" data-pt="${p.passenger_type_id}" data-tier="${tier.price_tier_id}"></div>`).join('')
  ).join('');
  box.innerHTML = `<h3>開團(設定庫存與售價)</h3>
    <div class="form">
      <div class="fld"><label>商品 *</label><select id="t-product">${products.map(p=>`<option value="${p.product_id}">${esc(p.name)}</option>`).join('')}</select></div>
      <div class="fld"><label>團號 *</label><input id="t-code" placeholder="HUA3D260701A"></div>
      <div class="fld"><label>出發日期 *</label><input id="t-start" type="date"></div>
      <div class="fld"><label>回程日期</label><input id="t-end" type="date"></div>
      <div class="fld"><label>成團門檻(最低人數)</label><input id="t-min" type="number" min="0" value="16"></div>
      <div class="fld"><label>報名上限(人,0=不限)</label><input id="t-max" type="number" min="0" value="0"></div>
      <div class="fld"><label>報名截止日</label><input id="t-deadline" type="date"></div>
    </div>
    <h3 style="margin-top:16px">庫存</h3><div class="form">${inv}</div>
    <h3 style="margin-top:16px">售價</h3><div class="form">${prc}</div>
    <div style="margin-top:16px"><button class="btn" onclick="submitTour()">建立團期</button>
      <button class="btn ghost" onclick="toggleTourForm()">取消</button></div>`;
  box.classList.remove('hide');
};
window.submitTour = async () => {
  const code=$('#t-code').value.trim(), start=$('#t-start').value;
  if(!code) return toast('請填寫團號', true);
  if(!start) return toast('請選擇出發日期', true);
  const inventory=[...document.querySelectorAll('[data-res]')].map(i=>({resource_type_id:+i.dataset.res,total_qty:+i.value||0}));
  const prices=[...document.querySelectorAll('#tourForm [data-pt]')].map(i=>({passenger_type_id:+i.dataset.pt,price_tier_id:+i.dataset.tier,price:+i.value||0,deposit_ratio:0.3}));
  try{ await api('/api/tours','POST',{product_id:+$('#t-product').value,tour_code:code,start_date:start,end_date:$('#t-end').value||start,min_pax:+$('#t-min').value||0,max_pax:+$('#t-max').value||0,signup_deadline:$('#t-deadline').value||start,inventory,prices});
    toast('團期已建立'); renderTours();
  }catch(e){ toast(e.message,true); }
};

// ═══════════ 商品管理(步驟1)═══════════
async function renderProducts(){
  const products = await api('/api/products');
  C().innerHTML = `
    <div class="section-title"><h2>商品管理</h2><button class="btn" onclick="toggleProductForm()">＋ 新增商品</button></div>
    <div id="prodForm" class="formbox hide">
      <h3>新增行程商品</h3>
      <div class="form">
        <div class="fld"><label>商品代碼</label><input id="p-code" placeholder="HUA3D"></div>
        <div class="fld"><label>行程名稱 *</label><input id="p-name" placeholder="花蓮三日遊"></div>
        <div class="fld"><label>區域類型</label><select id="p-region"><option>國內</option><option>國外</option></select></div>
        <div class="fld"><label>天數</label><input id="p-days" type="number" min="1" value="3"></div>
      </div>
      <div style="margin-top:14px"><button class="btn" onclick="submitProduct()">建立商品</button>
        <button class="btn ghost" onclick="toggleProductForm()">取消</button></div>
    </div>
    <div class="card"><table>
      <tr><th>代碼</th><th>行程名稱</th><th>區域</th><th>天數</th><th>狀態</th><th>已開團數</th><th>操作</th></tr>
      ${products.map(p=>`<tr><td>${esc(p.product_code)}</td><td>${esc(p.name)}</td><td>${esc(p.region_type)}</td>
        <td>${p.days}天</td><td><span class="badge ${p.status==='上架'?'b-green':'b-gray'}">${esc(p.status)}</span></td>
        <td>${p.tour_count>0?`<span class="link" onclick="viewProduct(${p.product_id})">${p.tour_count} 團 →</span>`:'0 團'}</td>
        <td><button class="btn sm ghost" onclick="toggleProductStatus(${p.product_id},'${p.status==='上架'?'下架':'上架'}')">${p.status==='上架'?'下架':'上架'}</button></td></tr>`).join('')}
    </table></div>`;
}
window.toggleProductStatus = async (id, status) => {
  try{ await api(`/api/products/${id}/status`,'POST',{status}); toast('商品已'+status); renderProducts(); }
  catch(e){ toast(e.message,true); }
};
window.viewProduct = async (id) => {
  setTitle('商品的團期');
  const d = await api(`/api/products/${id}/tours`);
  C().innerHTML = `
    <span class="crumb" onclick="go('products')">← 返回商品管理</span>
    <div class="section-title"><h2>${esc(d.product.name)}（${esc(d.product.product_code)}）的團期</h2></div>
    <div class="card"><table>
      <tr><th>團號</th><th>出發日</th><th>回程日</th><th>截止日</th><th>成團門檻</th><th>已報名</th><th>報名上限</th><th>可售</th><th>狀態</th><th>操作</th></tr>
      ${d.tours.map(t=>`<tr><td>${esc(t.tour_code)}</td><td>${t.start_date}</td><td>${t.end_date}</td><td>${t.signup_deadline}</td>
        <td>${t.min_pax}</td><td>${t.signed_pax}</td><td>${t.max_pax>0?t.max_pax:'不限'}</td><td><b>${t.available}</b></td><td>${tourBadge(t.status)}</td>
        <td><span class="link" onclick="openTour(${t.tour_id})">控團</span></td></tr>`).join('')
       || '<tr><td colspan=10 class="muted">此商品尚未開團</td></tr>'}
    </table></div>`;
};
window.toggleProductForm = () => $('#prodForm').classList.toggle('hide');
window.submitProduct = async () => {
  const name=$('#p-name').value.trim();
  if(!name) return toast('請填寫行程名稱', true);
  try{ await api('/api/products','POST',{product_code:$('#p-code').value.trim(),name,region_type:$('#p-region').value,days:+$('#p-days').value||1});
    toast('商品已建立'); renderProducts();
  }catch(e){ toast(e.message,true); }
};

// ═══════════ 單團控團 ═══════════
window.openTour = async (id) => {
  state.curTour = id; setTitle('單團控團');
  const d = await api('/api/admin/tours/'+id); const t = d.tour;
  const totalAmt = d.orders.filter(o=>o.status!=='取消'&&o.status!=='逾期取消').reduce((s,o)=>s+o.items.reduce((a,i)=>a+i.final_amount,0),0);
  const paidAmt = d.orders.reduce((s,o)=>s+o.paid,0);
  const invCards = d.inventory.map(i=>`<div class="card"><h3>${esc(i.name)}</h3><div class="metric">${i.used_qty} / ${i.total_qty}</div>
    <div class="progress ${pct(i.used_qty,i.total_qty)>85?'orange':''}"><span style="width:${pct(i.used_qty,i.total_qty)}%"></span></div><div class="muted">剩 ${i.remain}</div></div>`).join('');
  C().innerHTML = `
    <span class="crumb" onclick="go('tours')">← 返回團期列表</span>
    <div class="section-title"><h2>${esc(t.product_name)}｜${esc(t.tour_code)} ${tourBadge(t.status)}</h2>
      <button class="btn" onclick="state.signupTour=${id};go('signup')">＋ 建立報名</button></div>
    <div id="tourEdit" class="formbox hide"></div>
    <div class="grid grid-3">
      <div class="card"><h3>成團進度 <button class="btn sm ghost" style="float:right" onclick="editTour(${id},${t.min_pax},${t.max_pax||0})">編輯門檻/上限</button></h3>
        <div class="metric">${d.confirmed_pax} / ${t.min_pax}</div>
        <div class="progress ${t.status==='已成團'?'blue':'orange'}"><span style="width:${pct(d.confirmed_pax,t.min_pax)}%"></span></div>
        <div class="muted">已報名 ${d.signed_pax} 人 ・ 報名上限 ${t.max_pax>0?t.max_pax:'不限'}</div></div>
      <div class="card"><h3>可售名額</h3><div class="metric">${d.available}</div>
        <div class="muted">${t.max_pax>0?'上限−已報名,並受庫存限制':'以最緊資源計算'}</div></div>
      <div class="card"><h3>收款狀態</h3><div class="metric">${pct(paidAmt,totalAmt)}%</div><div class="progress"><span style="width:${pct(paidAmt,totalAmt)}%"></span></div>
        <div class="muted">${money(paidAmt)} / ${money(totalAmt)}</div></div>
    </div>
    <div class="grid grid-3" style="margin-top:16px">${invCards}</div>
    <div class="card" style="margin-top:16px"><h3>訂單清單(${d.orders.length})</h3><table>
      <tr><th>訂單編號</th><th>客戶</th><th>人數</th><th>成交金額</th><th>契約</th><th>付款</th><th>狀態</th><th>操作</th></tr>
      ${d.orders.map(o=>{const tot=o.items.reduce((a,i)=>a+i.final_amount,0);const ppl=o.items.reduce((a,i)=>a+i.qty,0);
        return `<tr><td>${esc(o.order_no)}</td><td>${esc(o.customer_name)}</td><td>${ppl}</td><td>${money(tot)}</td>
        <td>${signBadge(o.contract_signed)}</td><td>${payBadge(o.paid,tot)}</td><td>${orderBadge(o.status)}</td>
        <td><span class="link" onclick="openOrder(${o.order_id})">明細</span></td></tr>`;}).join('')
       || '<tr><td colspan=8 class="muted">尚無報名</td></tr>'}
    </table></div>`;
};

// ═══════════ 客戶報名(建立訂單 步驟5~6)═══════════
async function renderSignup(){
  const tours = (await api('/api/tours')).filter(t=>t.status==='報名中');
  if(!tours.length){ C().innerHTML='<div class="card">目前沒有「報名中」的團期,請先到團期列表開團。</div>'; return; }
  const pre = state.signupTour && tours.find(t=>t.tour_id===state.signupTour) ? state.signupTour : tours[0].tour_id;
  state.signupTour = null;
  C().innerHTML = `
    <div class="section-title"><h2>客戶報名</h2></div>
    <div class="grid grid-2">

window.onChannelChange = () => { if($('#s-tier')) $('#s-tier').value = tierForChannel($('#s-channel').value); loadSignupPrices(); };
window.loadSignupPrices = async () => {
  const id = +$('#s-tour').value;
  const tier = +($('#s-tier') && $('#s-tier').value) || defaultTierId();
  const d = await api('/api/tours/'+id);
  const rows = d.prices.filter(p=>p.price_tier_id===tier);
  $('#s-price').innerHTML = `<tr><th>旅客類型</th><th>人數</th><th>成交單價</th><th>成交小計</th></tr>` +
    (rows.length?rows:d.prices).map(p=>`<tr><td>${esc(p.name)}</td>
      <td><input class="qty" type="number" min="0" value="0" data-pt="${p.passenger_type_id}" data-price="${p.price}" oninput="calcSignup()"></td>
      <td>${money(p.price)}</td><td class="sub" data-for="${p.passenger_type_id}">NT$ 0</td></tr>`).join('');
  calcSignup();
};
window.calcSignup = () => {
  let sum=0;
  document.querySelectorAll('#s-price [data-pt]').forEach(i=>{const q=+i.value||0,pr=+i.dataset.price,st=q*pr;sum+=st;
    const cell=document.querySelector(`.sub[data-for="${i.dataset.pt}"]`); if(cell)cell.textContent=money(st);});
  $('#s-total').textContent = '最終成交金額 '+money(sum);
};
window.submitSignup = async () => {
  const name=$('#s-name').value.trim();
  if(!name) return toast('請填寫客戶姓名', true);
  const items=[]; document.querySelectorAll('#s-price [data-pt]').forEach(i=>{const q=+i.value||0; if(q>0)items.push({passenger_type_id:+i.dataset.pt,qty:q});});
  if(!items.length) return toast('請至少選擇一位旅客', true);
  try{ const r=await api('/api/orders','POST',{tour_id:+$('#s-tour').value,channel:$('#s-channel').value,
      price_tier_id:+($('#s-tier')&&$('#s-tier').value)||defaultTierId(),
      customer:{name,phone:$('#s-phone').value.trim(),email:$('#s-email').value.trim()},items});
    toast('報名成功:'+r.order_no); openOrder(r.order_id);
  }catch(e){ toast(e.message,true); }
};

};

  const [pays, orders] = await Promise.all([api('/api/payments'), api('/api/orders')]);
  const payable = orders.filter(o=>o.status==='待付訂金'||o.status==='已確認');
  // 依訂單歸戶:把每張單的訂金/尾款分開加總(同一筆單可能多次收訂金或尾款)
  const byOrder = {};
  pays.forEach(p=>{ const s = byOrder[p.order_id] || (byOrder[p.order_id]={dep:0,fin:0});
    if(p.payment_type==='訂金') s.dep+=p.amount; else s.fin+=p.amount; });
  const summary = orders.filter(o=>o.total>0).map(o=>{
    const s = byOrder[o.order_id] || {dep:0,fin:0};
    const unpaid = o.total - o.paid;
    return `<tr>
      <td><span class="link" onclick="openOrder(${o.order_id})">${esc(o.order_no)}</span></td>
      <td>${esc(o.customer_name)}</td><td>${esc(o.tour_code)}</td>
      <td>${money(o.total)}</td><td>${money(s.dep)}</td><td>${money(s.fin)}</td>
      <td>${money(o.paid)}</td><td>${unpaid>0?`<strong style="color:var(--orange,#c60)">${money(unpaid)}</strong>`:money(0)}</td>
      <td>${payBadge(o.paid,o.total)}</td></tr>`;
  }).join('');
  C().innerHTML = `
    <div class="section-title"><h2>收款管理</h2><button class="btn" onclick="togglePayForm()">＋ 新增收款</button></div>
    <div id="payForm" class="formbox hide"><h3>新增收款</h3>
      <div class="form">
        <div class="fld"><label>訂單 *</label><select id="py-order">${payable.map(o=>`<option value="${o.order_id}">${esc(o.order_no)}｜${esc(o.customer_name)}｜未收 ${money(o.total-o.paid)}</option>`).join('')}</select></div>
        <div class="fld"><label>類型</label><select id="py-type"><option>訂金</option><option>尾款</option></select></div>
        <div class="fld"><label>金額 *</label><input id="py-amount" type="number" min="0"></div>
        <div class="fld"><label>方式</label><select id="py-method" onchange="togglePayNote()"><option>信用卡</option><option>匯款</option><option>現金</option><option>ATM</option></select></div>
        <div class="fld" id="py-note-fld" style="display:none"><label>匯款帳號後 5 碼</label><input id="py-note" maxlength="5" placeholder="12345"></div>
        <div class="fld"><label>備註</label><input id="py-remark" placeholder="選填,例:分期 / 代刷 / 客戶要求…"></div>
      </div>
      <div style="margin-top:12px"><button class="btn" onclick="submitPay()">建立收款</button><button class="btn ghost" onclick="togglePayForm()">取消</button></div>
    </div>
    <div class="card"><h3>訂單收款彙總</h3>
      <div class="muted" style="margin-bottom:8px">一張單一列;訂金、尾款分開列示,未收金額醒目標示。點訂單編號可看明細。</div>
      <table>
      <tr><th>訂單</th><th>客戶</th><th>團號</th><th>成交總額</th><th>已收訂金</th><th>已收尾款</th><th>已收合計</th><th>未收</th><th>狀態</th></tr>
      ${summary || '<tr><td colspan=9 class="muted">尚無訂單</td></tr>'}
    </table></div>
    <div class="card" style="margin-top:16px"><h3>收款流水(逐筆)</h3>
      <table>
      <tr><th>收款時間</th><th>訂單</th><th>客戶</th><th>類型</th><th>方式</th><th>金額</th><th>備註</th></tr>
      ${pays.map(p=>`<tr><td>${(p.paid_at||'').replace('T',' ')}</td><td>${esc(p.order_no)}</td><td>${esc(p.customer_name)}</td>
        <td>${esc(p.payment_type)}</td><td>${esc(p.method)}</td><td>${money(p.amount)}</td><td>${payNote(p)}</td></tr>`).join('')
       || '<tr><td colspan=7 class="muted">尚無收款</td></tr>'}
    </table></div>`;
}
window.togglePayForm = () => $('#payForm').classList.toggle('hide');
window.togglePayNote = () => { $('#py-note-fld').style.display = ($('#py-method').value==='匯款') ? '' : 'none'; };
window.submitPay = async () => {
  const oid=+$('#py-order').value, amount=+$('#py-amount').value||0, method=$('#py-method').value;
  if(!oid) return toast('請選擇訂單', true);
  if(amount<=0) return toast('請填寫金額', true);
  const note = (method==='匯款') ? ($('#py-note')?.value.trim()||'') : '';
  const remark = $('#py-remark')?.value.trim()||'';
  try{ await api(`/api/orders/${oid}/pay`,'POST',{payment_type:$('#py-type').value,amount,method,note,remark});
    toast('收款已登記'); renderPayments();
  }catch(e){ toast(e.message,true); }
};

// ═══════════ 設定 ═══════════
let settingsTab = 'rules';
async function renderSettings(){
  const s = await api('/api/settings'); window._S = s;
  const tab = (id,label) => `<button class="btn ${settingsTab===id?'':'ghost'}" style="border-radius:8px 8px 0 0" onclick="setSettingsTab('${id}')">${label}</button>`;
  C().innerHTML = `
    <div class="section-title"><h2>設定</h2></div>
    <div class="card">
      <div style="display:flex;gap:6px;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px">
        ${tab('rules','消耗規則')}${tab('passenger','旅客類型')}${tab('resource','資源類型')}
      </div>
      <div id="pane"></div>
    </div>`;
  renderSettingsPane(s);
}
window.setSettingsTab = (id) => { settingsTab = id; renderSettings(); };

let rulesEditing = false;
function renderSettingsPane(s){
  const pane = $('#pane');
  if(settingsTab==='rules'){
    const head = `<tr><th>旅客類型</th>${s.resource_types.map(r=>`<th>${esc(r.name)}</th>`).join('')}<th>計入成團</th></tr>`;
    const rows = s.passenger_types.map(pt=>`<tr><td>${esc(pt.name)}</td>${s.resource_types.map(rt=>{
        const q = s.rules[`${pt.passenger_type_id}_${rt.resource_type_id}`] ?? 0;
        return rulesEditing
          ? `<td><input class="qty" style="width:64px" type="number" min="0" value="${q}" data-pt="${pt.passenger_type_id}" data-rt="${rt.resource_type_id}"></td>`
          : `<td>${q}</td>`;
      }).join('')}<td>${pt.counts_toward_min?'是':'否'}</td></tr>`).join('');
    pane.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="muted">報名時系統依此規則自動扣對應資源(車位/床位/機位)。</span>
        ${rulesEditing?'':'<button class="btn sm" onclick="editRules()">編輯規則</button>'}
      </div>
      <table>${head}${rows}</table>
      ${rulesEditing?`
      <div style="display:flex;gap:10px;align-items:flex-end;margin-top:14px;flex-wrap:wrap">
        <div class="fld" style="max-width:200px"><label>填寫人</label><input id="rule-editor" value="OP 管理者"></div>
        <button class="btn" onclick="saveRules()">儲存規則</button>
        <button class="btn ghost" onclick="cancelRules()">取消</button>
      </div>`:''}
      <h3 style="margin-top:22px">異動紀錄</h3>
      <table><tr><th>填寫人</th><th>時間</th><th>內容</th></tr>
        ${s.rule_log.map(l=>`<tr><td>${esc(l.edited_by)}</td><td>${(l.edited_at||'').replace('T',' ')}</td><td>${esc(l.detail)}</td></tr>`).join('')
         || '<tr><td colspan=3 class="muted">尚無紀錄</td></tr>'}
      </table>`;
  } else if(settingsTab==='passenger'){
    pane.innerHTML = `
      <div style="margin-bottom:12px"><button class="btn sm" onclick="togglePtForm()">＋ 新增旅客類型</button></div>
      <div id="ptForm" class="formbox hide">
        <div class="form">
          <div class="fld"><label>類型名稱 *</label><input id="pt-name" placeholder="例:敬老票"></div>
          <div class="fld"><label>是否計入成團人數</label><select id="pt-counts"><option value="1">計入</option><option value="0">不計入</option></select></div>
        </div>
        <div style="margin-top:12px"><button class="btn" onclick="addPassengerType()">建立</button><button class="btn ghost" onclick="togglePtForm()">取消</button></div>
      </div>
      <table>
      <tr><th>名稱</th><th>計入成團</th><th>狀態</th><th>操作</th></tr>
      ${s.passenger_types.map(p=>`<tr><td>${esc(p.name)}</td>
        <td><span class="badge ${p.counts_toward_min?'b-blue':'b-gray'}">${p.counts_toward_min?'計入':'不計入'}</span></td>
        <td><span class="badge ${p.status==='啟用'?'b-green':'b-gray'}">${esc(p.status)}</span></td>
        <td><button class="btn sm ghost" onclick="renameType('passenger-types',${p.passenger_type_id},'${esc(p.name)}')">改名</button>
          <button class="btn sm ghost" onclick="toggleCounts(${p.passenger_type_id},${p.counts_toward_min})">${p.counts_toward_min?'改為不計入':'改為計入'}</button>
          <button class="btn sm ghost" onclick="toggleStatus('passenger-types',${p.passenger_type_id},'${p.status==='啟用'?'停用':'啟用'}')">${p.status==='啟用'?'停用':'啟用'}</button></td></tr>`).join('')}
    </table>`;
  } else {
    pane.innerHTML = `
      <div class="muted" style="margin-bottom:12px">資源類型 = 可賣的「位子桶」(車位/床位/機位…)。每團在庫存設定各桶數量,報名時依消耗規則扣桶,任一桶不足即擋下(防超賣)。</div>
      <div style="margin-bottom:12px"><button class="btn sm" onclick="addResource()">＋ 新增資源類型</button></div>
      <table>
      <tr><th>名稱</th><th>狀態</th><th>操作</th></tr>
      ${s.resource_types.map(r=>`<tr><td>${esc(r.name)}</td>
        <td><span class="badge ${r.status==='啟用'?'b-green':'b-gray'}">${esc(r.status)}</span></td>
        <td><button class="btn sm ghost" onclick="renameType('resource-types',${r.resource_type_id},'${esc(r.name)}')">改名</button>
          <button class="btn sm ghost" onclick="toggleStatus('resource-types',${r.resource_type_id},'${r.status==='啟用'?'停用':'啟用'}')">${r.status==='啟用'?'停用':'啟用'}</button></td></tr>`).join('')}
    </table>`;
  }
}
window.editRules = () => { rulesEditing = true; renderSettings(); };
window.cancelRules = () => { rulesEditing = false; renderSettings(); };
window.saveRules = async () => {
  const rules = [...document.querySelectorAll('#pane [data-pt][data-rt]')].map(i=>({passenger_type_id:+i.dataset.pt,resource_type_id:+i.dataset.rt,qty:+i.value||0}));
  const edited_by = $('#rule-editor')?.value.trim() || 'OP 管理者';
  try{ await api('/api/consumption-rules','PUT',{rules,edited_by}); META = await api('/api/meta'); rulesEditing = false; toast('消耗規則已儲存'); renderSettings(); }
  catch(e){ toast(e.message,true); }
};
window.toggleStatus = async (kind, id, status) => {
  try{ await api(`/api/${kind}/${id}/status`,'POST',{status}); META = await api('/api/meta'); toast('已更新'); renderSettings(); }
  catch(e){ toast(e.message,true); }
};
window.toggleCounts = async (id, cur) => {
  try{ await api(`/api/passenger-types/${id}`,'POST',{counts_toward_min: cur?0:1}); META = await api('/api/meta'); toast('已更新'); renderSettings(); }
  catch(e){ toast(e.message,true); }
};
window.renameType = async (kind, id, cur) => {
  const name = prompt('修改名稱', cur); if(name==null) return;
  if(!name.trim()) return toast('名稱不可空白', true);
  try{ await api(`/api/${kind}/${id}`,'POST',{name:name.trim()}); META = await api('/api/meta'); toast('已更新'); renderSettings(); }
  catch(e){ toast(e.message,true); }
};
window.togglePtForm = () => $('#ptForm').classList.toggle('hide');
window.addPassengerType = async () => {
  const name = $('#pt-name').value.trim(); if(!name) return toast('請填寫類型名稱', true);
  try{ await api('/api/passenger-types','POST',{name,counts_toward_min:+$('#pt-counts').value}); META = await api('/api/meta'); toast('已新增,消耗規則已同步'); renderSettings(); }
  catch(e){ toast(e.message,true); }
};
window.addResource = async () => {
  const name = prompt('新增資源類型名稱(例:船位)'); if(name==null) return;
  if(!name.trim()) return toast('名稱不可空白', true);
  try{ await api('/api/resource-types','POST',{name:name.trim()}); META = await api('/api/meta'); toast('已新增,消耗規則已同步'); renderSettings(); }
  catch(e){ toast(e.message,true); }
};

// ═══════════ 啟動 ═══════════
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.page));
(async () => {
  $('#todayLabel').innerText = 'OP 管理者｜今日：' + new Date().toISOString().slice(0,10).replace(/-/g,'/');
  META = await api('/api/meta');
  go('tours');
})();
</script>
</body>
</html>
