<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>線控資源準備（可互動原型）</title>
<style>
  :root{ --green:#2f9e44; --orange:#e8590c; --blue:#1c7ed6; --gray:#adb5bd; --line:#dee2e6; --ink:#212529; --muted:#868e96; --bg:#f8f9fa; }
  *{ box-sizing:border-box; }
  body{ font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif; color:var(--ink); background:var(--bg); margin:0; line-height:1.6; }
  .wrap{ max-width:980px; margin:0 auto; padding:18px 18px 80px; }
  h1{ font-size:20px; margin:0 0 2px; }
  h2{ font-size:17px; margin:6px 0 10px; }
  .sub{ color:var(--muted); font-size:13px; margin:0 0 12px; }
  h3{ font-size:15px; margin:18px 0 8px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:12px 0; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .note-banner{ background:#fff3bf; border:1px solid #ffe066; border-radius:8px; padding:9px 13px; font-size:13px; color:#664d03; margin:10px 0; }
  .info-banner{ background:#e7f5ff; border:1px solid #a5d8ff; border-radius:8px; padding:9px 13px; font-size:13px; color:#1864ab; margin:10px 0; }
  .muted{ color:var(--muted); } .small{ font-size:12.5px; }
  .badge{ display:inline-block; font-size:12px; padding:2px 9px; border-radius:999px; border:1px solid var(--line); background:#fff; }
  .b-green{ background:#ebfbee; color:var(--green); border-color:#b2f2bb; }
  .b-orange{ background:#fff4e6; color:var(--orange); border-color:#ffd8a8; }
  .b-blue{ background:#e7f5ff; color:var(--blue); border-color:#a5d8ff; }
  .b-red{ background:#fff5f5; color:#e03131; border-color:#ffc9c9; }
  .b-gray{ background:#f1f3f5; color:var(--muted); }
  .stepper{ display:flex; align-items:flex-start; overflow-x:auto; padding:6px 0; }
  .step{ flex:1 0 auto; min-width:96px; text-align:center; position:relative; }
  .step .dot{ width:28px; height:28px; border-radius:50%; margin:0 auto 5px; display:flex; align-items:center; justify-content:center; font-size:14px; border:2px solid var(--gray); color:var(--gray); background:#fff; }
  .step.done .dot{ background:var(--green); border-color:var(--green); color:#fff; }
  .step.now .dot{ border-color:var(--orange); color:var(--orange); border-width:3px; font-weight:700; }
  .step .lbl{ font-size:12.5px; color:var(--muted); white-space:nowrap; }
  .step.done .lbl{ color:var(--ink); } .step.now .lbl{ color:var(--orange); font-weight:700; }
  .step:not(:last-child)::after{ content:""; position:absolute; top:14px; left:calc(50% + 17px); right:calc(-50% + 17px); height:2px; background:var(--line); }
  .step.done:not(:last-child)::after{ background:var(--green); }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th,td{ border:1px solid var(--line); padding:6px 8px; text-align:left; vertical-align:middle; }
  th{ background:#f1f3f5; font-weight:600; }
  input,select{ padding:5px 7px; border:1px solid var(--line); border-radius:7px; background:#fff; font-size:13.5px; }
  input[type=number]{ width:70px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn{ display:inline-block; background:var(--blue); color:#fff; border:none; border-radius:8px; padding:8px 15px; font-size:13.5px; cursor:pointer; }
  .btn:hover{ filter:brightness(.95); }
  .btn.ghost{ background:#fff; color:var(--ink); border:1px solid var(--line); }
  .btn.green{ background:var(--green); } .btn.sm{ padding:5px 10px; font-size:12.5px; }
  .btn.link{ background:none; color:var(--blue); padding:0; text-decoration:underline; cursor:pointer; border:none; }
  .right{ text-align:right; } .tot{ font-size:15px; font-weight:700; }
  .pill{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:5px 11px; font-size:13px; display:inline-block; }
  .arrow{ color:var(--muted); font-weight:700; margin:0 4px; }
  .del{ color:#e03131; cursor:pointer; font-weight:700; }
  .tabs{ display:flex; gap:6px; flex-wrap:wrap; margin:4px 0 10px; }
  .tab{ border:1px solid var(--line); background:#fff; border-radius:999px; padding:5px 13px; font-size:13px; cursor:pointer; color:var(--muted); }
  .tab.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .trow{ cursor:pointer; } .trow:hover td{ background:#f8f9fa; }
  .crumb{ font-size:13px; color:var(--muted); margin-bottom:8px; }
  .crumb b{ color:var(--ink); }
</style>
</head>
<body>
<div class="wrap">
  <h1>線控資源準備 <span class="badge b-orange">可互動原型</span></h1>
  <div id="view"></div>
</div>

<script>
// ───────── 假資料庫（前端記憶體，模擬「資源庫」） ─────────
const DB = {
  busTypes: [
    { name:'四排 2+2 標準（42席）', seats:42, cost:18000 },
    { name:'三排 2+1 高級（34席）', seats:34, cost:22000 },
    { name:'12 人座小巴', seats:12, cost:9000 },
  ],
  restaurants: [ { name:'花蓮○○海鮮樓', per:10, cost:6000 }, { name:'台東△△風味餐廳', per:10, cost:5000 } ],
  locals: [ { name:'○○當地接待社', cost:30000 }, { name:'☆☆地接公司', cost:27000 } ],
  leaders: [
    { name:'王大明', busy:['2026-09-13','2026-10-02'] },
    { name:'陳小華', busy:[] },
    { name:'林志強', busy:['2026-08-16'] },
  ],
};
const STAGES = ['資源預估','待簽核','已開團 / 報名中','預訂確認','完成'];
const stageBadge = i => { const c=['b-orange','b-blue','b-blue','b-orange','b-green'][i]; return `<span class="badge ${c}">${STAGES[i]}</span>`; };

// 預設資源(開團時從範本帶入的初始值)
const defaultRes = () => ({ bus:[{type:0,qty:1}], meals:[{r:0,tables:4}], local:{v:0}, rooms:{dbl:18,tri:2}, tickets:[{name:'○○遊樂園 全票',qty:40,cost:1000},{name:'台鐵對號（去程）',qty:40,cost:500}], leaderIdx:null });

// ───────── 多個團(工作台資料) ─────────
const TOURS = [
  { code:'HUA3D260912A', name:'花蓮三日遊', type:'系列團',   start:'2026-09-12', end:'2026-09-14', signed:35, minPax:16, stageIdx:0, res:defaultRes() },
  { code:'HUA3D261005A', name:'花蓮三日遊', type:'系列團',   start:'2026-10-05', end:'2026-10-07', signed:8,  minPax:16, stageIdx:1, res:defaultRes() },
  { code:'HOK5261001A',  name:'北海道五日', type:'系列團',   start:'2026-10-01', end:'2026-10-05', signed:22, minPax:10, stageIdx:2, res:defaultRes() },
  { code:'CUS260920W',   name:'王公司客製團', type:'客製包團', start:'2026-09-20', end:'2026-09-22', signed:30, minPax:20, stageIdx:3, res:defaultRes() },
  { code:'HUA3D260815A', name:'花蓮三日遊', type:'系列團',   start:'2026-08-15', end:'2026-08-17', signed:40, minPax:16, stageIdx:4, res:defaultRes() },
];

const ui = { view:'board', cur:null, filter:-1 };  // filter:-1=全部
const $ = s => document.querySelector(s);
const money = n => 'NT$ ' + (n||0).toLocaleString();
const T = () => TOURS[ui.cur];

// 成本
function busCost(t){ return t.res.bus.reduce((s,b)=> s + DB.busTypes[b.type].cost*b.qty, 0); }
function mealCost(t){ return t.res.meals.reduce((s,m)=> s + DB.restaurants[m.r].cost*m.tables, 0); }
function localCost(t){ return DB.locals[t.res.local.v].cost; }
function roomCost(t){ return t.res.rooms.dbl*3800 + t.res.rooms.tri*5400; }
function ticketCost(t){ return t.type==='客製包團' ? t.res.tickets.reduce((s,x)=>s+x.cost*x.qty,0)+12000 : 0; }
function totalCost(t){ return busCost(t)+mealCost(t)+localCost(t)+roomCost(t)+ticketCost(t); }
function seatsOf(t){ return t.res.bus.reduce((s,b)=>s+DB.busTypes[b.type].seats*b.qty,0); }

// ═════════ 工作台 ═════════
function renderBoard(){
  const counts = STAGES.map((_,i)=> TOURS.filter(t=>t.stageIdx===i).length);
  const list = ui.filter<0 ? TOURS : TOURS.filter(t=>t.stageIdx===ui.filter);
  $('#view').innerHTML = `
    <h2>線控準備工作台</h2>
    <p class="sub">這裡列出需要線控處理的團,依階段分組。點任一團 → 進入該團的資源準備流程。</p>
    <div class="tabs">
      <span class="tab ${ui.filter<0?'active':''}" onclick="setFilter(-1)">全部 ${TOURS.length}</span>
      ${STAGES.map((s,i)=>`<span class="tab ${ui.filter===i?'active':''}" onclick="setFilter(${i})">${s} ${counts[i]}</span>`).join('')}
    </div>
    <div class="card" style="padding:0">
      <table>
        <tr><th>團號</th><th>行程</th><th>團型</th><th>出團日期</th><th>報名/門檻</th><th>目前階段</th><th></th></tr>
        ${list.map((t,idx)=>{ const i=TOURS.indexOf(t); return `<tr class="trow" onclick="openTour(${i})">
          <td><b>${t.code}</b></td><td>${t.name}</td><td>${t.type}</td>
          <td>${t.start} ~ ${t.end}</td>
          <td>${t.signed} / ${t.minPax} ${t.signed>=t.minPax?'<span class="badge b-green">已成團</span>':'<span class="badge b-gray">未達</span>'}</td>
          <td>${stageBadge(t.stageIdx)}</td>
          <td><button class="btn sm" onclick="event.stopPropagation();openTour(${i})">進入 →</button></td></tr>`; }).join('')
          || '<tr><td colspan="7" class="muted" style="text-align:center;padding:18px">此階段目前沒有團</td></tr>'}
      </table>
    </div>
    <p class="small muted">＊純前端示意,資料不會儲存。走完某團流程返回此頁,該團階段會即時更新。</p>`;
}

// ═════════ 某團的資源準備 ═════════
function renderTour(){
  const t = T();
  const head = `
    <div class="crumb"><span class="btn link" onclick="backToBoard()">← 線控準備工作台</span>　/　<b>${t.code}</b> ${t.name}</div>
    <div class="card" style="padding:10px 14px;margin:6px 0">
      <b>${t.code}</b>　${t.name}　<span class="badge b-gray">${t.type}</span>
      <span class="muted small">出團 ${t.start}~${t.end}　報名 ${t.signed}/${t.minPax} 人</span>
    </div>
    <div class="stepper">${STAGES.map((s,i)=>{ const c=i<t.stageIdx?'done':(i===t.stageIdx?'now':''); const m=i<t.stageIdx?'✓':(i===t.stageIdx?'●':'○'); return `<div class="step ${c}"><div class="dot">${m}</div><div class="lbl">${s}</div></div>`; }).join('')}</div>`;
  $('#view').innerHTML = head + (t.stageIdx<=2 ? estimateHtml(t) : confirmHtml(t));
}

function estimateHtml(t){
  const locked = t.stageIdx>=1, dis = locked?'disabled':'';
  const custom = t.type==='客製包團';
  return `
    <div class="card">
      <div class="row2">
        <div><label class="small muted">團型</label><br>
          <select onchange="T().type=this.value;render()" ${dis}>
            <option ${t.type==='系列團'?'selected':''}>系列團</option>
            <option ${t.type==='客製包團'?'selected':''}>客製包團</option>
          </select></div>
        <div class="right small muted">出團 ${t.start} ~ ${t.end}　成團門檻 ${t.minPax} 人</div>
      </div>
      <p class="small muted">系列團自動帶範本預設;客製包團多出 <b>門票 / 車票 / 領隊</b>。</p>

      <h3>a. 遊覽車</h3>
      <table><tr><th>車型(資源庫選)</th><th>席數</th><th>數量</th><th>小計</th><th></th></tr>
        ${t.res.bus.map((b,i)=>`<tr>
          <td><select onchange="T().res.bus[${i}].type=+this.value;render()" ${dis}>${DB.busTypes.map((x,j)=>`<option value="${j}" ${b.type===j?'selected':''}>${x.name}(${money(x.cost)}/台)</option>`).join('')}</select></td>
          <td>${DB.busTypes[b.type].seats}</td>
          <td><input type="number" min="1" value="${b.qty}" onchange="T().res.bus[${i}].qty=+this.value||1;render()" ${dis}> 台</td>
          <td>${money(DB.busTypes[b.type].cost*b.qty)}</td>
          <td>${locked?'':`<span class="del" onclick="T().res.bus.splice(${i},1);render()">✕</span>`}</td></tr>`).join('')}
        ${locked?'':`<tr><td colspan="5"><button class="btn link" onclick="T().res.bus.push({type:0,qty:1});render()">＋ 新增車輛</button></td></tr>`}
      </table>

      <h3>b. 餐廳</h3>
      <table><tr><th>餐廳(資源庫選)</th><th>每桌</th><th>桌數</th><th>小計</th><th></th></tr>
        ${t.res.meals.map((m,i)=>`<tr>
          <td><select onchange="T().res.meals[${i}].r=+this.value;render()" ${dis}>${DB.restaurants.map((r,j)=>`<option value="${j}" ${m.r===j?'selected':''}>${r.name}(${money(r.cost)}/桌)</option>`).join('')}</select></td>
          <td>${DB.restaurants[m.r].per} 人</td>
          <td><input type="number" min="1" value="${m.tables}" onchange="T().res.meals[${i}].tables=+this.value||1;render()" ${dis}> 桌</td>
          <td>${money(DB.restaurants[m.r].cost*m.tables)}</td>
          <td>${locked?'':`<span class="del" onclick="T().res.meals.splice(${i},1);render()">✕</span>`}</td></tr>`).join('')}
        ${locked?'':`<tr><td colspan="5"><button class="btn link" onclick="T().res.meals.push({r:0,tables:1});render()">＋ 新增餐廳</button></td></tr>`}
      </table>

      <h3>c. 地接 ｜ d. 飯店房間 ｜ e. 機位</h3>
      <table>
        <tr><th>項目</th><th>內容</th><th>數量 / 規格</th><th>小計</th></tr>
        <tr><td>地接</td>
          <td><select onchange="T().res.local.v=+this.value;render()" ${dis}>${DB.locals.map((l,j)=>`<option value="${j}" ${t.res.local.v===j?'selected':''}>${l.name}</option>`).join('')}</select></td>
          <td>1 式</td><td>${money(localCost(t))}</td></tr>
        <tr><td>飯店</td><td>○○溫泉飯店</td>
          <td>雙人 <input type="number" min="0" value="${t.res.rooms.dbl}" onchange="T().res.rooms.dbl=+this.value||0;render()" ${dis}> 間　三人 <input type="number" min="0" value="${t.res.rooms.tri}" onchange="T().res.rooms.tri=+this.value||0;render()" ${dis}> 間</td>
          <td>${money(roomCost(t))}</td></tr>
        <tr><td>機位</td><td>${t.name.includes('北海道')?'○○航空 來回':'國內團無機位'}</td><td>${t.name.includes('北海道')?t.minPax+' 位':'—'}</td><td>${t.name.includes('北海道')?money(t.minPax*8000):'—'}</td></tr>
      </table>
      <div class="info-banner">🔗 飯店 ${t.res.rooms.dbl+t.res.rooms.tri} 間、遊覽車 ${seatsOf(t)} 席 → 自動成為這團「可售庫存上限」。</div>

      ${custom?`<h3>客製包團才有:f. 門票 ｜ g. 車票 ｜ h. 領隊</h3>
      <table><tr><th>項目</th><th>數量</th><th>小計</th></tr>
        ${t.res.tickets.map((x,i)=>`<tr><td>${x.name}</td>
          <td><input type="number" min="0" value="${x.qty}" onchange="T().res.tickets[${i}].qty=+this.value||0;render()" ${dis}> 張</td>
          <td>${money(x.cost*x.qty)}</td></tr>`).join('')}
        <tr><td>領隊(預估階段先預留 1 名,不指定人)</td><td>1 名</td><td>${money(12000)}</td></tr>
      </table>`:''}

      <div class="right" style="margin-top:14px"><span class="tot">預估總成本:${money(totalCost(t))}</span></div>
    </div>
    ${signBox(t)}`;
}

function signBox(t){
  if (t.stageIdx===0) return `<div class="card right"><button class="btn" onclick="next()">送出給線控主管簽核 →</button></div>`;
  if (t.stageIdx===1) return `<div class="card">
      <h3>簽核鏈(關卡可調)</h3>
      <div><span class="pill" style="border-color:#b2f2bb;background:#ebfbee">線控助理 送出 ✓</span>
        <span class="arrow">→</span>
        <span class="pill" style="border-color:#ffd8a8;background:#fff4e6">線控主管 <span class="badge b-orange">待簽核</span></span>
        <span class="arrow">→</span>
        <span class="pill" style="opacity:.5">(未來可加)財務 <span class="badge b-gray">未啟用</span></span></div>
      <div style="margin-top:12px"><button class="btn green" onclick="next()">主管:簽核通過 → 開團</button>
        <button class="btn ghost" onclick="prev()">退回修改</button></div></div>`;
  return `<div class="card">
      <div class="info-banner">✅ 已簽核開團,目前報名中(已報名 ${t.signed} 人 / 門檻 ${t.minPax} 人)。</div>
      <button class="btn" onclick="next()">⏰ 模擬「達成團人數」→ 進入預訂確認</button></div>`;
}

function confirmHtml(t){
  const done = t.stageIdx===4;
  const leader = t.res.leaderIdx!=null ? DB.leaders[t.res.leaderIdx] : null;
  const conflict = leader ? leader.busy.some(d=> d>=t.start && d<=t.end) : false;
  return `
    <div class="card">
      ${done?'<div class="info-banner">🎉 預訂確認完成,本團資源已全部確認。</div>'
            :`<div class="note-banner">⏰ 已達成團人數(${t.minPax} 人),請於 cut-off 前完成各項「實際預訂」並指定實體。</div>`}
      <h3>對量檢驗(預估 vs 實際報名 ${t.signed} 人)</h3>
      <table><tr><th>項目</th><th>當初預估</th><th>實際需求</th><th>狀態</th></tr>
        <tr><td>遊覽車</td><td>${t.res.bus.reduce((s,b)=>s+b.qty,0)} 台 / ${seatsOf(t)} 席</td><td>${t.signed} 人</td><td>${seatsOf(t)>=t.signed?'<span class="badge b-green">相符</span>':'<span class="badge b-red">席數不足</span>'}</td></tr>
        <tr><td>餐廳桌數</td><td>${t.res.meals.reduce((s,m)=>s+m.tables,0)} 桌</td><td>${Math.ceil(t.signed/10)} 桌</td><td><span class="badge b-orange">建議確認桌數</span></td></tr>
        <tr><td>飯店房間</td><td>雙人${t.res.rooms.dbl}+三人${t.res.rooms.tri}</td><td>依實際配房</td><td><span class="badge b-orange">需重配房</span></td></tr>
      </table>
      <h3>綁定實體 ＋ 衝突檢查(此階段才做)</h3>
      <table><tr><th>項目</th><th>指定實體</th><th>日期</th><th>衝突檢查</th></tr>
        <tr><td>遊覽車</td><td>大發遊覽車 ABC-123</td><td>${t.start}–${t.end}</td><td><span class="badge b-green">無衝突</span></td></tr>
        <tr><td>領隊</td>
          <td><select onchange="T().res.leaderIdx=this.value===''?null:+this.value;render()">
            <option value="">— 請指派 —</option>
            ${DB.leaders.map((l,j)=>`<option value="${j}" ${t.res.leaderIdx===j?'selected':''}>${l.name}</option>`).join('')}
          </select></td>
          <td>${t.start}–${t.end}</td>
          <td>${leader?(conflict?`<span class="badge b-red">衝突:${leader.busy.join('、')} 已排別團</span>`:'<span class="badge b-green">無衝突</span>'):'<span class="badge b-gray">未指派</span>'}</td></tr>
      </table>
      <p class="small muted">試試把領隊指派成「王大明」(9/13、10/2 已排別團)看會不會跳衝突;換成「陳小華」就無衝突。</p>
      <div style="margin-top:14px">
        ${done?`<button class="btn ghost" onclick="backToBoard()">← 返回工作台</button>`
              :`<button class="btn green" onclick="finishConfirm()">全部確認預訂完成</button>
                <button class="btn ghost" onclick="prev()">← 返回</button>`}
      </div>
    </div>`;
}

// ───────── 動作 ─────────
function render(){ ui.view==='board' ? renderBoard() : renderTour(); }
function setFilter(i){ ui.filter=i; render(); }
function openTour(i){ ui.view='tour'; ui.cur=i; window.scrollTo(0,0); render(); }
function backToBoard(){ ui.view='board'; ui.cur=null; window.scrollTo(0,0); render(); }
function next(){ const t=T(); if(t.stageIdx<STAGES.length-1){ t.stageIdx++; render(); } }
function prev(){ const t=T(); if(t.stageIdx>0){ t.stageIdx--; render(); } }
function finishConfirm(){
  const t=T(); const leader=t.res.leaderIdx!=null?DB.leaders[t.res.leaderIdx]:null;
  if(!leader){ alert('請先指派領隊'); return; }
  if(leader.busy.some(d=>d>=t.start && d<=t.end)){ alert('領隊有排班衝突,請改派其他領隊'); return; }
  t.stageIdx=4; render();
}
['render','setFilter','openTour','backToBoard','next','prev','finishConfirm'].forEach(k=>window[k]=eval(k));
window.T=T;

render();
</script>
</body>
</html>
